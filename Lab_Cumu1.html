<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>MKT Laboratory EMR - Professional Edition 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; height: 100vh; overflow: hidden; }
        .critical { color: #dc2626; font-weight: bold; background-color: #fef2f2; }
        .abnormal { color: #9a3412; font-weight: bold; background-color: #fff7ed; }
        .sticky-left { position: sticky; left: 0; background: white; z-index: 10; border-right: 1px solid #e2e8f0; }
        .dialog-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); }
        .lab-item-compact { padding: 4px 12px; border-bottom: 1px solid #f1f5f9; min-height: 52px; }
        .history-item { background-color: #f8fafc !important; border-left: 4px solid #94a3b8; }
        .timeline-mini { display: flex; gap: 6px; font-family: monospace; font-size: 8px; color: #64748b; margin-top: 2px; }
        .time-node { background: #f8fafc; padding: 1px 4px; border-radius: 3px; border: 1px solid #e2e8f0; }
        .cd-focus { border-color: #bfdbfe; background: #eff6ff; color: #1d4ed8; font-weight: bold; }
        .group-header { background-color: #475569; padding: 4px 12px; font-size: 10px; font-weight: 700; color: white; letter-spacing: 0.1em; }
        .badge-status { font-size: 8px; padding: 1px 4px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        .badge-today { background: #2563eb; color: white; }
        .badge-history { background: #64748b; color: white; }
        .active-preview { background-color: #e0f2fe !important; border-right: 5px solid #0284c7; }
        .matrix-table th, .matrix-table td { padding: 3px 8px !important; font-size: 11px; }

        /* COLLECT TIME */
        .collect-sub-row td { background: #f0f9ff !important; border-top: 2px solid #bae6fd; border-bottom: 1px dashed #bae6fd; padding: 2px 8px !important; }
        .collect-label { font-size: 8.5px; font-weight: 900; color: #0369a1; text-transform: uppercase; letter-spacing: 0.06em; }
        .collect-time { font-size: 8px; font-weight: 700; color: #0284c7; font-family: monospace; background: #e0f2fe; padding: 0px 4px; border-radius: 3px; border: 1px solid #bae6fd; }
        .collect-time-today { color: #dc2626 !important; background: #fef2f2 !important; border-color: #fecaca !important; }
        .collect-na { font-size: 8px; color: #cbd5e1; font-family: monospace; }

        /* SMART DELTA ALERT — inline, zero extra row height */
        .delta-badge { display: inline-flex; align-items: center; font-size: 7.5px; font-weight: 900; padding: 0px 4px; border-radius: 3px; margin-left: 4px; font-family: monospace; white-space: nowrap; vertical-align: middle; line-height: 1.5; }
        .delta-alarm-up  { background:#fef2f2; color:#991b1b; border:1px solid #fca5a5; }
        .delta-high-up   { background:#fef2f2; color:#dc2626; border:1px solid #fca5a5; }
        .delta-mid-up    { background:#fff7ed; color:#ea580c; border:1px solid #fed7aa; }
        .delta-low-up    { background:#fffbeb; color:#d97706; border:1px solid #fde68a; }
        .delta-alarm-dn  { background:#eff6ff; color:#1e40af; border:1px solid #93c5fd; }
        .delta-high-dn   { background:#eff6ff; color:#2563eb; border:1px solid #93c5fd; }
        .delta-mid-dn    { background:#f0fdf4; color:#16a34a; border:1px solid #86efac; }
        .delta-low-dn    { background:#f0fdf4; color:#15803d; border:1px solid #86efac; }
        .delta-cell      { display:inline; }

        /* CLINICAL INSIGHTS PANEL */
        .insights-panel { border-bottom: 1px solid #e2e8f0; background: #fafafa; flex-shrink: 0; }
        .insights-header { display:flex; align-items:center; justify-content:space-between; padding:7px 14px; cursor:pointer; user-select:none; }
        .insights-header:hover { background:#f1f5f9; }
        .insight-cards { padding: 8px 14px 12px; display:flex; flex-direction:column; gap:8px; }
        .insight-item { border-radius: 12px; padding: 10px 14px; }
        .insight-item.sev-critical { background:#fef2f2; border:1px solid #fca5a5; }
        .insight-item.sev-warning  { background:#fffbeb; border:1px solid #fde68a; }
        .insight-item.sev-info     { background:#eff6ff; border:1px solid #bfdbfe; }
        .insight-title  { font-size:11px; font-weight:900; display:flex; align-items:center; gap:6px; }
        .insight-ev     { font-size:9px; font-family:monospace; color:#64748b; margin-top:4px; line-height:1.7; }
        .insight-action { font-size:10px; color:#374151; margin-top:6px; padding-top:6px; border-top:1px dashed #e2e8f0; display:flex; gap:5px; }

        /* MEDICATION LEGEND */
        .med-bar { display:flex; flex-wrap:wrap; gap:6px; padding:10px 14px; background:white; border-radius:14px; border:1px solid #e2e8f0; margin-bottom:14px; align-items:center; }
        .med-bar-title { font-size:9px; font-weight:900; color:#475569; text-transform:uppercase; letter-spacing:.1em; margin-right:4px; flex-shrink:0; }
        .med-chip { display:inline-flex; align-items:center; gap:4px; font-size:9px; font-weight:700; padding:3px 9px; border-radius:20px; white-space:nowrap; border:1px solid; }

        /* GRAPH */
        .graph-stack-item { background:white; padding:16px; border-radius:18px; border:1px solid #e2e8f0; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
        .graph-group-label { font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; padding-bottom:8px; border-bottom:2px solid; display:flex; align-items:center; justify-content:space-between; gap:8px; }
        .graph-toggles { display:flex; flex-wrap:wrap; gap:4px; }
        .gtb { font-size:9px; padding:2px 9px; border-radius:20px; border:1px solid; cursor:pointer; font-weight:bold; transition:all .15s; }
        .gtb.on { color:white !important; }
        .graph-canvas-wrap { position:relative; height:185px; margin-top:8px; }

        /* SERIAL LAB INDICATORS */
        .badge-serial { background:#0d9488; color:white; font-size:7.5px; padding:1px 5px; border-radius:4px; font-weight:900; letter-spacing:.03em; }
        .serial-item  { border-left:4px solid #0d9488 !important; background:#f0fdfa !important; }
        .serial-item.active-preview { border-left:4px solid #0d9488 !important; background:#ccfbf1 !important; }
        .serial-latest { font-size:10px; font-weight:900; font-family:monospace; }
        .serial-readings-row { display:flex; gap:3px; margin-top:3px; flex-wrap:wrap; align-items:center; }
        .serial-dot  { display:inline-flex; flex-direction:column; align-items:center; background:#f8fafc; border:1px solid #e2e8f0; border-radius:5px; padding:1px 5px; min-width:38px; }
        .serial-dot.hi  { background:#fef2f2; border-color:#fca5a5; }
        .serial-dot.lo  { background:#eff6ff; border-color:#93c5fd; }
        .serial-dot.cr  { background:#fef2f2; border-color:#991b1b; animation:pulse-crit 1.2s infinite; }
        .serial-dot.ok  { background:#f0fdf4; border-color:#86efac; }
        .serial-dot .sd-time { font-size:7px; color:#94a3b8; font-family:monospace; }
        .serial-dot .sd-val  { font-size:9.5px; font-weight:900; font-family:monospace; line-height:1.2; }
        .serial-dot.hi .sd-val { color:#dc2626; }
        .serial-dot.lo .sd-val { color:#2563eb; }
        .serial-dot.cr .sd-val { color:#991b1b; }
        .serial-dot.ok .sd-val { color:#15803d; }
        @keyframes pulse-crit { 0%,100%{box-shadow:0 0 0 0 #dc262644;} 50%{box-shadow:0 0 0 4px #dc262600;} }
        /* Alert dot on MONITOR button */
        .monitor-alert-dot { width:7px;height:7px;background:#dc2626;border-radius:50%;display:inline-block;margin-left:3px;animation:pulse-crit 1s infinite;flex-shrink:0; }
        /* Serial strip inside TABLE */
        .serial-strip-row td { background:#f0fdfa !important; border-top:1px solid #99f6e4; border-bottom:2px solid #0d9488; padding:5px 10px !important; }
        .serial-strip-inner { display:flex; gap:4px; align-items:stretch; flex-wrap:nowrap; overflow-x:auto; padding:1px 0; }
        .serial-strip-cell { display:flex; flex-direction:column; align-items:center; justify-content:center; min-width:44px; border-radius:6px; padding:3px 6px; border:1px solid #e2e8f0; background:white; flex-shrink:0; }
        .serial-strip-cell.now { border:2px solid #d97706; background:#fffbeb; }
        .serial-strip-cell.crit { border:2px solid #dc2626; background:#fef2f2; animation:pulse-crit 1.2s infinite; }
        .serial-strip-cell.hi   { border:1px solid #fca5a5; background:#fef2f2; }
        .serial-strip-cell.lo   { border:1px solid #93c5fd; background:#eff6ff; }
        .serial-strip-cell.ok   { border:1px solid #86efac; background:#f0fdf4; }
        .ssc-time { font-size:7.5px; color:#94a3b8; font-family:monospace; }
        .ssc-val  { font-size:11px; font-weight:900; font-family:monospace; line-height:1.2; }
        .ssc-val.crit { color:#991b1b; }
        .ssc-val.hi   { color:#dc2626; }
        .ssc-val.lo   { color:#2563eb; }
        .ssc-val.ok   { color:#15803d; }
        .ssc-ins  { font-size:9px; font-weight:900; color:#7c3aed; font-family:monospace; }
        .ssc-trend{ font-size:8px; color:#64748b; }
        .fs-toolbar { display:flex; align-items:center; gap:10px; padding:10px 14px; background:#f8fafc; border-bottom:1px solid #e2e8f0; flex-shrink:0; flex-wrap:wrap; }
        .fs-day-btn { font-size:9px; font-weight:800; padding:3px 10px; border-radius:20px; border:1px solid #e2e8f0; background:white; cursor:pointer; color:#64748b; transition:all .15s; white-space:nowrap; }
        .fs-day-btn.active { background:#0f172a; color:white; border-color:#0f172a; }
        .fs-table { width:100%; border-collapse:collapse; font-size:10.5px; }
        .fs-table th { position:sticky; top:0; background:#1e293b; color:#94a3b8; font-size:8.5px; font-weight:900; text-transform:uppercase; letter-spacing:.08em; padding:5px 8px; text-align:center; white-space:nowrap; z-index:20; }
        .fs-table th.fs-param-col { left:0; z-index:30; background:#0f172a; color:#cbd5e1; text-align:left; min-width:140px; }
        .fs-table td { padding:3px 8px; text-align:center; border-bottom:1px solid #f1f5f9; border-right:1px solid #f8fafc; white-space:nowrap; font-family:monospace; font-size:11px; }
        .fs-table td.fs-param-label { position:sticky; left:0; background:white; z-index:10; text-align:left; font-family:'Sarabun',sans-serif; font-weight:700; font-size:10px; color:#334155; border-right:2px solid #e2e8f0; padding-left:12px; }
        .fs-table td.fs-unit { font-size:8px; color:#94a3b8; font-family:'Sarabun',sans-serif; font-weight:normal; display:block; margin-top:1px; }
        .fs-table tr:hover td { background:#f8fafc; }
        .fs-table tr:hover td.fs-param-label { background:#f1f5f9; }
        .fs-group-hdr td { background:#475569 !important; color:white; font-size:9px; font-weight:900; text-transform:uppercase; letter-spacing:.1em; padding:3px 12px !important; }
        .fs-val-hi  { color:#dc2626; font-weight:900; }
        .fs-val-lo  { color:#2563eb; font-weight:900; }
        .fs-val-crit{ color:#991b1b; font-weight:900; background:#fef2f2; border-radius:3px; padding:0 3px; }
        .fs-val-ok  { color:#15803d; }
        .fs-val-ins { color:#7c3aed; font-weight:800; }
        .fs-val-empty { color:#e2e8f0; }
        .fs-now-col { background:#fffbeb !important; }
        .fs-now-hdr { background:#d97706 !important; color:white !important; }
        .fs-sparkline { display:flex; align-items:flex-end; gap:1px; height:18px; margin-top:2px; }
        .fs-spark-bar { width:5px; border-radius:1px 1px 0 0; min-height:2px; opacity:.75; }
        .fs-summary-row td { background:#f0fdf4 !important; font-size:9px; color:#166534; font-weight:700; }
        .fs-summary-row td.fs-param-label { background:#f0fdf4 !important; }
        .fs-insulin-row td { background:#faf5ff !important; }
        .fs-insulin-row td.fs-param-label { background:#faf5ff !important; }

        /* DASHBOARD */
        .dashboard-modal { display:none; position:fixed; inset:0; background:#f8fafc; z-index:100; overflow-y:auto; padding:20px; }
        .status-tab { padding:4px 12px; border-radius:20px; font-size:10px; font-weight:bold; cursor:pointer; border:1px solid #e2e8f0; background:white; }
        .status-tab.active { background:#1e293b; color:white; border-color:#1e293b; }
        .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-top:20px; }
        .lab-card { background:white; border-radius:20px; padding:20px; border:1px solid #e2e8f0; display:flex; flex-direction:column; justify-content:space-between; min-height:280px; box-shadow:0 4px 6px -1px rgb(0 0 0/.1); }
        .gauge-container { position:relative; height:100px; margin:15px 0; }
        .gauge-bg { stroke:#f1f5f9; stroke-width:8; fill:none; stroke-linecap:round; }
        .gauge-needle { stroke-width:3; fill:none; stroke-linecap:round; transition:all .5s ease; }
    </style>
</head>
<body class="flex flex-col text-sm">



<!-- MAIN -->
<div class="flex flex-1 overflow-hidden">

    <!-- LEFT: Lab list -->
    <div class="w-1/3 bg-white border-r flex flex-col shadow-inner">
        <div class="p-3 bg-slate-50 border-b flex flex-col gap-2">
            <div class="flex justify-between items-center">
                <span class="text-[11px] font-black text-blue-800 uppercase tracking-widest">Lab Groups Navigation</span>
                <label class="flex items-center gap-2 cursor-pointer bg-white px-2 py-0.5 rounded-full border shadow-sm">
                    <span class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">Show History</span>
                    <input type="checkbox" id="toggleShowAll" onchange="renderList()" class="form-checkbox h-3 w-3 text-blue-600 rounded">
                </label>
            </div>
            <select id="groupFilter" onchange="renderList()" class="w-full text-[10px] border border-slate-300 rounded-lg p-1.5 bg-white outline-none">
                <option value="ALL">All Groups</option>
                <option value="Hematology">Hematology</option>
                <option value="BloodChem">Blood Chemistry</option>
                <option value="Immunology">Immunology</option>
                <option value="Urinalysis">Urinalysis</option>
                <option value="Microbiology">Microbiology</option>
                <option value="CardiacMarker">Cardiac Markers</option>
            </select>
        </div>
        <div id="orderList" class="overflow-y-auto flex-1 divide-y divide-slate-100"></div>
    </div>

    <!-- RIGHT: Matrix -->
    <div class="flex-1 bg-slate-100 p-3 overflow-auto">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col h-full">

            <!-- Toolbar -->
            <div class="p-4 border-b bg-white flex justify-between items-center flex-shrink-0">
                <div class="flex gap-4 items-center">
                    <span class="font-black text-slate-800 text-sm tracking-tight">CLINICAL MATRIX ANALYTICS</span>
                    <div class="flex bg-slate-100 p-1 rounded-xl border">
                        <button onclick="switchView('table')"   id="btnTable"   class="px-4 py-1 text-[10px] rounded-lg bg-white shadow-sm font-bold">TABLE</button>
                        <button onclick="switchView('graph')"   id="btnGraph"   class="px-4 py-1 text-[10px] rounded-lg font-bold text-slate-500 hover:text-slate-700">GRAPH</button>
                        <button onclick="switchView('monitor')" id="btnMonitor" class="px-4 py-1 text-[10px] rounded-lg font-bold text-slate-500 hover:text-slate-700 flex items-center gap-1">
                            <i class="fa-solid fa-heart-pulse text-rose-500"></i> MONITOR<span id="monitorAlertDot" class="monitor-alert-dot hidden"></span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- CLINICAL INSIGHTS PANEL -->
            <div id="insightsPanel" class="insights-panel hidden">
                <div class="insights-header" onclick="toggleInsights()">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-brain text-violet-600 text-sm"></i>
                        <span class="text-[11px] font-black text-slate-800 uppercase tracking-wider">Clinical Insights</span>
                        <span id="insightsBadge" class="text-[9px] font-black px-2 py-0.5 rounded-full"></span>
                    </div>
                    <i id="insightsChevron" class="fa-solid fa-chevron-down text-slate-400 text-xs" style="transition:transform .25s"></i>
                </div>
                <div id="insightBody" class="insight-cards"></div>
            </div>

            <!-- TABLE VIEW -->
            <div id="tableView" class="flex-1 overflow-auto">
                <table class="matrix-table w-full text-left border-collapse text-center">
                    <thead class="sticky top-0 z-20">
                        <tr class="bg-slate-50 text-[9px] text-slate-500 uppercase font-black border-b">
                            <th class="sticky-left min-w-[200px] bg-slate-50 text-left p-3">Test Description (Unit)</th>
                            <th class="min-w-[88px] bg-blue-50 text-blue-700 border-l italic">08/03/26 Today</th>
                            <th class="min-w-[68px] border-l italic">15/12/25</th>
                            <th class="min-w-[68px] border-l italic">10/09/25</th>
                            <th class="min-w-[68px] border-l italic text-slate-500">22/05/25</th>
                            <th class="min-w-[68px] border-l italic text-slate-400">05/01/25</th>
                            <th class="min-w-[68px] border-l italic text-slate-300">12/10/24</th>
                            <th class="min-w-[84px] border-l font-bold">Reference</th>
                        </tr>
                    </thead>
                    <tbody id="comparisonBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>

            <!-- GRAPH VIEW -->
            <div id="graphView" class="hidden flex-1 p-4 bg-slate-50 overflow-y-auto">
                <div id="medBar" class="med-bar hidden"></div>
                <div id="graphStack" class="max-w-4xl mx-auto"></div>
            </div>

            <!-- MONITORING FLOWSHEET VIEW -->
            <div id="monitorView" class="hidden flex-1 flex flex-col overflow-hidden bg-slate-50">
                <!-- Day selector toolbar -->
                <div class="fs-toolbar">
                    <i class="fa-solid fa-heart-pulse text-rose-500 text-sm flex-shrink-0"></i>
                    <span class="text-[10px] font-black text-slate-700 uppercase tracking-widest flex-shrink-0">Monitoring Flowsheet</span>
                    <div class="h-4 w-px bg-slate-300 flex-shrink-0"></div>
                    <span class="text-[9px] text-slate-500 flex-shrink-0">เลือกวัน:</span>
                    <div id="fsDayBtns" class="flex gap-2 flex-wrap"></div>
                    <div class="ml-auto flex items-center gap-2">
                        <span class="text-[8.5px] text-slate-400">ทุก</span>
                        <select id="fsIntervalSel" onchange="renderFlowsheet()" class="text-[9px] border border-slate-200 rounded-lg px-2 py-1 bg-white outline-none font-bold text-slate-700">
                            <option value="4">4 ชั่วโมง</option>
                            <option value="2">2 ชั่วโมง</option>
                            <option value="1">1 ชั่วโมง</option>
                        </select>
                        <label class="flex items-center gap-1.5 text-[9px] text-slate-500 cursor-pointer">
                            <input type="checkbox" id="fsShowAll" onchange="renderFlowsheet()" class="h-3 w-3 rounded">
                            แสดงทุก param
                        </label>
                    </div>
                </div>
                <!-- Flowsheet table -->
                <div class="flex-1 overflow-auto">
                    <table class="fs-table" id="fsTable">
                        <thead id="fsThead"></thead>
                        <tbody id="fsTbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- EMPTY STATE -->
            <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-slate-300 gap-3 italic text-sm">
                <i class="fa-solid fa-microscope text-5xl opacity-20"></i>
                <p>กรุณาเลือกรายการ Lab เพื่อวิเคราะห์ข้อมูลเปรียบเทียบ</p>
            </div>
        </div>
    </div>
</div>

<!-- RESULT DIALOG -->
<div id="resultDialog" class="fixed inset-0 dialog-overlay hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-[2.5rem] shadow-2xl w-2/5 overflow-hidden border">
        <div id="dialogContent" class="p-10"></div>
        <div class="p-6 bg-slate-50 border-t flex justify-end gap-4">
            <button onclick="closeDialog()" class="bg-slate-900 text-white px-8 py-2.5 rounded-2xl text-xs font-bold hover:bg-black">CLOSE</button>
        </div>
    </div>
</div>

<!-- PATIENT DASHBOARD -->
<div id="patientDashboard" class="dashboard-modal">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-2">
                <button class="status-tab active">ทั้งหมด</button>
                <button class="status-tab text-red-600 border-red-100">วิกฤต</button>
                <button class="status-tab text-orange-600 border-orange-100">ผิดปกติ</button>
                <button class="status-tab text-green-600 border-green-100">ปกติ</button>
            </div>
            <button onclick="closeDashboard()" class="bg-slate-200 text-slate-600 h-10 w-10 rounded-full flex items-center justify-center hover:bg-slate-300">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="card-grid" id="dashboardGrid"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// DATA CONSTANTS
// ═══════════════════════════════════════════════════════
const clinicalDates = ['12/10/24','05/01/25','22/05/25','10/09/25','15/12/25','08/03/26'];

// ── MEDICATION / TREATMENT EVENTS ──────────────────────
const medicationEvents = [

const refRangePlugin = {
    id:'refRangeShade',
    beforeDatasetsDraw(chart) {
        const rr = chart.config._refRange;
        if (!rr) return;
        const {ctx,chartArea,scales} = chart;
        const ys = scales.y;
        ctx.save();
        const yA = rr.min!=null ? ys.getPixelForValue(rr.min) : chartArea.bottom;
        const yB = rr.max!=null ? ys.getPixelForValue(rr.max) : chartArea.top;
        const top = Math.max(Math.min(yA,yB), chartArea.top);
        const bot = Math.min(Math.max(yA,yB), chartArea.bottom);
        ctx.fillStyle = 'rgba(220,252,231,0.42)';
        ctx.fillRect(chartArea.left, top, chartArea.right-chartArea.left, bot-top);
        ctx.strokeStyle = 'rgba(22,163,74,0.3)';
        ctx.setLineDash([4,4]); ctx.lineWidth=1;
        [rr.max,rr.min].forEach(v => {
            if(v==null) return;
            const y = ys.getPixelForValue(v);
            if(y<chartArea.top||y>chartArea.bottom) return;
            ctx.beginPath(); ctx.moveTo(chartArea.left,y); ctx.lineTo(chartArea.right,y); ctx.stroke();
        });
        if(rr.label){ ctx.fillStyle='rgba(22,163,74,.55)'; ctx.font='8px Sarabun,sans-serif'; ctx.setLineDash([]); ctx.fillText('ค่าปกติ: '+rr.label, chartArea.left+5, top-4); }
        ctx.restore();
    }
};

const medLinesPlugin = {
    id:'medLines',
    afterDraw(chart) {
        const {ctx,chartArea,scales} = chart;
        const xs = scales.x;
        medicationEvents.forEach(evt => {
            const idx = clinicalDates.indexOf(evt.dateLabel);
            if(idx<0) return;
            const x = xs.getPixelForValue(idx);
            if(x<chartArea.left||x>chartArea.right) return;
            ctx.save();
            ctx.strokeStyle = evt.color+'99'; ctx.setLineDash([5,3]); ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.moveTo(x,chartArea.top); ctx.lineTo(x,chartArea.bottom); ctx.stroke();
            const lbl = evt.shortLabel;
            ctx.font='bold 7.5px Sarabun,sans-serif';
            const tw = ctx.measureText(lbl).width+8;
            ctx.fillStyle=evt.color; ctx.setLineDash([]);
            ctx.beginPath(); if(ctx.roundRect){ctx.roundRect(x+1,chartArea.top,tw,13,2);}else{ctx.rect(x+1,chartArea.top,tw,13);} ctx.fill();
            ctx.fillStyle='white'; ctx.fillText(lbl,x+5,chartArea.top+9.5);
            ctx.restore();
        });
    }
};
Chart.register(refRangePlugin, medLinesPlugin);

// Get latest numeric value
function n(labs, labId, itemName) {
    const lab  = labs.find(l=>l.id===labId); if(!lab) return null;
    const item = lab.data.find(d=>d.item===itemName); if(!item) return null;
    const v = parseFloat(item.values[5]); return isNaN(v)?null:v;
}

// Format evidence string; spec = "labId:item:threshold:unit"
function ev4(labs, specs) {
    return specs.map(s=>{
        const [lid,itm,,unit] = s.split(':');
        const lab  = labs.find(l=>l.id===lid); if(!lab) return null;
        const item = lab.data.find(d=>d.item===itm); if(!item) return null;
        const v = item.values[5]; if(!v||v==='-') return null;
        return `${itm} = ${v} (${unit})`;
    }).filter(Boolean).join('  ·  ');
}

// Parse reference range string
function parseRef(str){
    if(!str) return null;
    const range=str.match(/(\d+\.?\d*)\s*[–\-]\s*(\d+\.?\d*)/);
    if(range) return {min:parseFloat(range[1]),max:parseFloat(range[2]),label:str};
    const lt=str.match(/[<≤]\s*(\d+\.?\d*)/); if(lt) return {min:0,max:parseFloat(lt[1]),label:str};
    const gt=str.match(/[>≥]\s*(\d+\.?\d*)/); if(gt) return {min:parseFloat(gt[1]),max:null,label:str};
    return null;
}

// Delta badge — clinical notation: HH/H/L/LL + % change
function deltaBadge(v5,v4){
    const now=parseFloat(v5), prev=parseFloat(v4);
    if(isNaN(now)||isNaN(prev)||prev===0) return '';
    const pct=((now-prev)/prev)*100, abs=Math.abs(pct);
    if(abs<5) return '';
    const up=pct>0;
    let cls,lbl;
    if(abs>100){ cls=up?'delta-alarm-up':'delta-alarm-dn'; lbl=up?'HH':'LL'; }
    else if(abs>50){ cls=up?'delta-high-up':'delta-high-dn'; lbl=up?'H↑↑':'L↓↓'; }
    else if(abs>20){ cls=up?'delta-mid-up':'delta-mid-dn';   lbl=up?'H↑':'L↓';   }
    else {           cls=up?'delta-low-up':'delta-low-dn';   lbl=up?'↑':'↓';      }
    return `<span class="delta-badge ${cls}">${lbl} ${pct>0?'+':''}${pct.toFixed(0)}%</span>`;
}

// CLINICAL PATTERN DETECTION
// ═══════════════════════════════════════════════════════
function detectAndShowPatterns(visLabs){
    const triggered=PATTERNS.filter(p=>{ try{return p.check(visLabs);}catch(e){return false;} });
    if(!triggered.length){ hideInsights(); return; }

    const panel=document.getElementById('insightsPanel');
    const body_el=document.getElementById('insightBody');
    const badge=document.getElementById('insightsBadge');
    const crit=triggered.filter(p=>p.severity==='critical').length;

    panel.classList.remove('hidden');
    badge.textContent=`${triggered.length} pattern${triggered.length>1?'s':''} detected${crit>0?' · '+crit+' CRITICAL':''}`;
    badge.className=`text-[9px] font-black px-2 py-0.5 rounded-full ${crit>0?'bg-red-100 text-red-700':'bg-amber-100 text-amber-700'}`;
    body_el.innerHTML='';
    if(!insightsOpen){ body_el.style.display='none'; return; }
    body_el.style.display='';

    triggered.forEach(p=>{
        const sevClass=p.severity==='critical'?'sev-critical':'sev-warning';
        const tc=p.severity==='critical'?'text-red-700':'text-amber-700';
        const div=document.createElement('div'); div.className=`insight-item ${sevClass}`;
          div.innerHTML=`
                <div class="insight-title ${tc}">
                    <span>${p.icon}</span><span>${p.title}</span>
                    ${p.severity==='critical'?'<span class="text-[8px] bg-red-600 text-white px-2 py-0.5 rounded-full font-black ml-1">CRITICAL</span>':''}
                </div>
                <div class="insight-ev">${p.ev(visLabs)||'—'}</div>
                <div class="insight-action">
                    <i class="fa-solid fa-angles-right text-slate-400 mt-0.5 text-[9px] shrink-0"></i>
                    <span>${p.action}</span>
                </div>`;
            body_el.appendChild(div);
        });

    // --- ส่วนที่เพิ่มใหม่: บังคับตั้งค่า Default ให้ "หุบ" ทันทีหลังโหลดข้อมูลเสร็จ ---
    insightsOpen = false;
    document.getElementById('insightBody').style.display = 'none';
    document.getElementById('insightsChevron').style.transform = 'rotate(-90deg)';
    // -------------------------------------------------------------------
}

function hideInsights(){ document.getElementById('insightsPanel').classList.add('hidden'); }
function toggleInsights(){
    insightsOpen=!insightsOpen;
    document.getElementById('insightBody').style.display=insightsOpen?'':'none';
    document.getElementById('insightsChevron').style.transform=insightsOpen?'':'rotate(-90deg)';
}

function switchView(mode){
    currentView=mode;
    const views=['tableView','graphView','monitorView'];
    views.forEach(v=>document.getElementById(v).classList.toggle('hidden', v!==mode+'View'));
    // Empty state: hide when monitorView is active (standalone data)
    document.getElementById('emptyState').style.display='none';
    // Button active state
    ['btnTable','btnGraph','btnMonitor'].forEach(b=>{
        const btn=document.getElementById(b);
        const isActive=(b==='btn'+mode.charAt(0).toUpperCase()+mode.slice(1));
        btn.className=`px-4 py-1 text-[10px] rounded-lg font-bold transition-all ${isActive?'bg-white shadow-sm text-slate-900':'text-slate-500 hover:text-slate-700'}`;
        if(b==='btnMonitor') btn.innerHTML=`<i class="fa-solid fa-heart-pulse ${isActive?'text-rose-500':'text-slate-400'}"></i> MONITOR`;
    });
    if(mode==='graph')   updateGraphs();
    if(mode==='monitor') initFlowsheet();
    // Show empty state only for table/graph when no labs selected
    if(mode!=='monitor'){
        let ids=[...pinnedIds]; if(previewId&&!pinnedIds.includes(previewId)) ids.push(previewId);
        if(!ids.length) document.getElementById('emptyState').style.display='flex';
    }
}

function updateGraphs(){
    const container=document.getElementById('graphStack');
    container.innerHTML='';
    activeCharts.forEach(c=>c.destroy()); activeCharts=[];
    let ids=[...pinnedIds];
    if(previewId&&!pinnedIds.includes(previewId)) ids.push(previewId);
    if(!ids.length) return;

    buildMedBar();
    const visLabs=allLabs.filter(l=>ids.includes(l.id)&&l.reported);

    visLabs.forEach(lab=>{
        const groups=clinicalGraphGroups[lab.id]||[{title:lab.name,color:'#2563eb',items:lab.data.map(d=>d.item)}];
        const sep=document.createElement('div');
        sep.className='text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 mt-3 px-1';
        sep.textContent=`── ${lab.name} ──`;
        container.appendChild(sep);

        groups.forEach((grp,gi)=>{
            const items=grp.items.map(nm=>lab.data.find(d=>d.item===nm)).filter(Boolean);
            if(!items.length) return;

            const wrap=document.createElement('div'); wrap.className='graph-stack-item';

            const btns=items.map((it,ci)=>{
                const c=CHART_COLORS[ci%CHART_COLORS.length];
                return `<button class="gtb on" id="gtb-${lab.id}-${gi}-${ci}"
                    style="color:${c};border-color:${c};background:${c};"
                    onclick="toggleDs('chart-${lab.id}-${gi}',${ci},this,'${c}')">
                    ${it.item}
                </button>`;
            }).join('');

            wrap.innerHTML=`
                <div class="graph-group-label" style="color:${grp.color};border-color:${grp.color}44;">
                    <span>${grp.title}</span>
                    <div class="graph-toggles">${btns}</div>
                </div>
                <div class="graph-canvas-wrap"><canvas id="chart-${lab.id}-${gi}"></canvas></div>`;
            container.appendChild(wrap);

            const datasets=items.map((it,ci)=>({
                label:it.item,
                data:it.values.map(v=>{const n=parseFloat(v);return isNaN(n)?null:n;}),
                borderColor:CHART_COLORS[ci%CHART_COLORS.length],
                backgroundColor:CHART_COLORS[ci%CHART_COLORS.length]+'28',
                borderWidth:2.5, pointRadius:4.5, pointHoverRadius:7,
                tension:.35, spanGaps:true,
            }));

            const rr=parseRef(items[0].ref);
            const ch=new Chart(document.getElementById(`chart-${lab.id}-${gi}`).getContext('2d'),{
                type:'line',
                data:{labels:clinicalDates,datasets},
                _refRange:rr,
                options:{
                    maintainAspectRatio:false,
                    interaction:{mode:'index',intersect:false},
                    plugins:{
                        legend:{display:false},
                        tooltip:{callbacks:{
                            afterTitle:()=>rr?`Ref (${items[0].item}): ${items[0].ref}`:'',
                        }}
                    },
                    scales:{
                        x:{grid:{color:'#f1f5f9'},ticks:{font:{size:9}}},
                        y:{grid:{color:'#f1f5f9'},ticks:{font:{size:9}}}
                    }
                }
            });
            activeCharts.push(ch);
        });
    });
}

function toggleDs(chartId,dsIdx,btn,color){
    const ch=activeCharts.find(c=>c.canvas.id===chartId); if(!ch) return;
    const meta=ch.getDatasetMeta(dsIdx);
    meta.hidden=!meta.hidden;
    btn.classList.toggle('on');
    btn.style.backgroundColor=meta.hidden?'':color;
    btn.style.color=meta.hidden?color:'white';
    ch.update();
}

function buildMedBar(){

// Classify a serial value for strip display
function serialCls(lab, val) {
    if(val===null||val===undefined) return 'ok';
    const param = fsParams.find(p=>p.id===lab.serialParamId);
    if(!param) return 'ok';
    if(param.critHigh!==null && val>=param.critHigh) return 'crit';
    if(param.critLow!==null  && val<=param.critLow)  return 'crit';
    if(param.refHigh!==null  && val>param.refHigh)   return 'hi';
    if(param.refLow!==null   && val<param.refLow)    return 'lo';
    return 'ok';
}

function fsClassify(p,val){
    if(val===null||val===undefined||val==='') return 'fs-val-empty';
    if(typeof val==='string') return 'fs-val-ins';
    if(p.critHigh!==null&&val>=p.critHigh) return 'fs-val-crit';
    if(p.critLow!==null&&val<=p.critLow)   return 'fs-val-crit';
    if(p.refHigh!==null&&val>p.refHigh)    return 'fs-val-hi';
    if(p.refLow!==null&&val<p.refLow)      return 'fs-val-lo';
    return 'fs-val-ok';
}

function fsSparkline(vals,color){
    const nums=vals.filter(v=>typeof v==='number');
    if(nums.length<2) return '';
    const mn=Math.min(...nums),mx=Math.max(...nums),rng=mx-mn||1;
    return `<div class="fs-sparkline">${nums.map(v=>`<div class="fs-spark-bar" style="height:${Math.max(2,Math.round(((v-mn)/rng)*16))}px;background:${color};"></div>`).join('')}</div>`;
}

            (param.id==='uo'||param.id==='iv')
            ?`Σ <b>${nums.reduce((a,b)=>a+b,0)}</b> mL`
            :`${mn?.toFixed(param.dec)} – ${mx?.toFixed(param.dec)}<br><span style="opacity:.6">avg ${avg?.toFixed(param.dec)}</span>`;

        tr.innerHTML=`
            <td class="fs-param-label">${param.label}<span class="fs-unit">${param.unit}</span></td>
            ${cells}
            <td>${fsSparkline(allVals,param.color)}</td>
            <td style="font-size:9px;color:#475569;font-family:'Sarabun',sans-serif;text-align:center;">${sumTxt}</td>`;
        tbody.appendChild(tr);
    });

    // Fluid balance summary
    const ivT=slots.reduce((s,sl)=>s+((dayData['iv']||{})[sl.h]||0),0);
    const uoT=slots.reduce((s,sl)=>s+((dayData['uo']||{})[sl.h]||0),0);
    const bal=ivT-uoT;
    const bCol=bal>500?'#dc2626':bal<-200?'#2563eb':'#15803d';
    const balRow=document.createElement('tr'); balRow.className='fs-summary-row';
    balRow.innerHTML=`
        <td class="fs-param-label" style="font-size:10px;font-weight:900;">⚖ Fluid Balance</td>
        <td colspan="${slots.length}" style="text-align:left;padding-left:12px;font-family:'Sarabun',sans-serif;font-size:10px;">
            IV In <b>${ivT} mL</b> &nbsp;·&nbsp; UO Out <b>${uoT} mL</b> &nbsp;·&nbsp;
            Balance <b style="color:${bCol}">${bal>0?'+':''}${bal} mL</b>
            ${Math.abs(bal)>500?'<span style="background:#fef2f2;color:#991b1b;font-size:8px;padding:1px 7px;border-radius:10px;margin-left:8px;font-weight:900;">⚠ IMBALANCED</span>':''}
        </td><td></td><td></td>`;
    tbody.appendChild(balRow);
}

function setFsDay(day){
    fsActiveDay=day;
    document.querySelectorAll('.fs-day-btn').forEach(b=>b.classList.toggle('active',b.dataset.day===day));
    renderFlowsheet();
}

function initFlowsheet(){
    const bar=document.getElementById('fsDayBtns'); bar.innerHTML='';
    fsDays.forEach(d=>{
        const b=document.createElement('button');
        b.className='fs-day-btn'+(d===fsActiveDay?' active':'');
        b.dataset.day=d; b.onclick=()=>setFsDay(d);
        b.textContent=d+(d==='08/03/26'?' (วันนี้)':'');
        bar.appendChild(b);
    });
    renderFlowsheet();
}

window.onload=()=>{ renderList(); setPreview('CBC'); updateMonitorAlertDot(); };
</script>
</body>
